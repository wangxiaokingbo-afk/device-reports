<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备检测报告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .header .timestamp {
            opacity: 0.9;
            font-size: 14px;
        }
        .content {
            padding: 30px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .conclusion-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .conclusion-box.success {
            border-left-color: #28a745;
            background: #f0fff4;
        }
        .conclusion-box.warning {
            border-left-color: #ffc107;
            background: #fffbf0;
        }
        .conclusion-box.error {
            border-left-color: #dc3545;
            background: #fff5f5;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e1e4e8;
        }
        .data-table th {
            background: #f6f8fa;
            font-weight: 600;
            color: #333;
        }
        .data-table tr:hover {
            background: #f6f8fa;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.success {
            background: #28a745;
            color: white;
        }
        .status-badge.warning {
            background: #ffc107;
            color: #333;
        }
        .status-badge.error {
            background: #dc3545;
            color: white;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .metric-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        .metric-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .footer {
            text-align: center;
            padding: 20px;
            background: #f6f8fa;
            color: #666;
            font-size: 12px;
        }
        .refresh-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .refresh-btn:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 设备检测报告</h1>
            <div class="timestamp" id="timestamp">更新时间：--</div>
        </div>
        
        <div class="content">
            <!-- 结论摘要 -->
            <div class="section">
                <div class="section-title">🎯 结论摘要</div>
                <div class="conclusion-box" id="conclusion-box">
                    <p id="conclusion-text">暂无数据</p>
                </div>
            </div>

            <!-- 关键指标 -->
            <div class="section">
                <div class="section-title">📈 关键指标</div>
                <div class="metric-grid" id="metrics-grid">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 详细数据 -->
            <div class="section">
                <div class="section-title">📋 详细数据</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>检测项</th>
                            <th>数值</th>
                            <th>状态</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>

            <!-- 建议 -->
            <div class="section">
                <div class="section-title">💡 优化建议</div>
                <div id="recommendations">
                    <p>暂无建议</p>
                </div>
            </div>

            <button class="refresh-btn" onclick="location.reload()">🔄 刷新数据</button>
        </div>

        <div class="footer">
            由 OpenClaw 自动生成 | <span id="footer-time"></span>
        </div>
    </div>

    <script>
        // 加载报告数据
        async function loadReport() {
            try {
                const response = await fetch('report-data.json?t=' + Date.now());
                const data = await response.json();
                renderReport(data);
            } catch (error) {
                console.error('加载报告失败:', error);
                document.getElementById('conclusion-text').textContent = '数据加载失败，请稍后刷新';
            }
        }

        function renderReport(data) {
            // 更新时间
            const now = new Date();
            document.getElementById('timestamp').textContent = '更新时间：' + now.toLocaleString('zh-CN');
            document.getElementById('footer-time').textContent = now.toLocaleString('zh-CN');

            // 结论
            const conclusionBox = document.getElementById('conclusion-box');
            const conclusionText = document.getElementById('conclusion-text');
            
            if (data.conclusion) {
                conclusionText.textContent = data.conclusion;
                conclusionBox.className = 'conclusion-box ' + (data.status || 'success');
            }

            // 指标
            const metricsGrid = document.getElementById('metrics-grid');
            if (data.metrics && data.metrics.length > 0) {
                metricsGrid.innerHTML = data.metrics.map(m => `
                    <div class="metric-card">
                        <div class="metric-value">${m.value}</div>
                        <div class="metric-label">${m.label}</div>
                    </div>
                `).join('');
            }

            // 详细数据
            const tableBody = document.getElementById('data-table-body');
            if (data.details && data.details.length > 0) {
                tableBody.innerHTML = data.details.map(d => `
                    <tr>
                        <td>${d.item}</td>
                        <td>${d.value}</td>
                        <td><span class="status-badge ${d.status || 'success'}">${d.statusText || '正常'}</span></td>
                        <td>${d.note || '-'}</td>
                    </tr>
                `).join('');
            }

            // 建议
            const recommendations = document.getElementById('recommendations');
            if (data.recommendations && data.recommendations.length > 0) {
                recommendations.innerHTML = '<ul>' + data.recommendations.map(r => 
                    `<li style="margin: 10px 0; padding-left: 20px;">${r}</li>`
                ).join('') + '</ul>';
            }
        }

        // 页面加载时获取数据
        loadReport();
    </script>
</body>
</html>
